name = "SpherePacking"
defaultTargets = ["SpherePacking"]

[leanOptions]
pp.unicode.fun = true
autoImplicit = false
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
weak.linter.flexible = false

[[require]]
name = "LeanModularForms"
scope = "CBirkbeck"
git  = "https://github.com/CBirkbeck/LeanModularForms.git"
rev  = "0fc82eb52d89548019d1447c960ff4d10706ab1e"

[[require]]
name = "checkdecls"
git  = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "mathlib"
git  = "https://github.com/leanprover-community/mathlib4.git"
rev  = "54f98fd67e63d316ddc3452ae31e18b2283be6e1"

[[lean_lib]]
name = "SpherePacking"
